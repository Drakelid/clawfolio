services:
  app:
    build: .
    expose:
      - "1010"
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=2048
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SECRET: ${ADMIN_SECRET}
    volumes:
      - portfolio-data:/app/src/data
      - portfolio-uploads:/app/public/uploads
    restart: unless-stopped

volumes:
  portfolio-data:
  portfolio-uploads:
