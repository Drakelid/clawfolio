services:
  app:
    build: .
    expose:
      - "1010"
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=2048
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SECRET: ${ADMIN_SECRET}
    volumes:
      - ./src/data:/app/src/data
      - ./public/uploads:/app/public/uploads
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:1010/portfolio',{redirect:'manual'}).then((response)=>process.exit(response.status===200?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped