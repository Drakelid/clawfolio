services:
  app:
    build: .
    expose:
      - "1010"
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=2048
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SECRET: ${ADMIN_SECRET}
    volumes:
      - ./src/data:/app/src/data
      - ./public/uploads:/app/public/uploads
    restart: unless-stopped
